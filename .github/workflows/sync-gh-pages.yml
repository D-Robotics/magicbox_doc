name: Sync to Aliyun OSS

on:
  # 监听第一个工作流成功完成
  workflow_run:
    workflows: ["Deploy Docusaurus site to GitHub Pages"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-to-oss:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. 下载第一个工作流构建的 Artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages  # upload-pages-artifact 默认上传的 artifact 名称
          path: ./downloaded-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      # 2. 正确解压 Artifact
      - name: Extract artifact
        run: |
          cd ./downloaded-artifact
          # github-pages artifact 是一个 tar.gz 文件
          tar -xzf *.tar.gz
          # 解压后得到 artifact.tar
          tar -xf artifact.tar
          # 现在当前目录就是构建好的静态文件
          ls -la
          
      # 3. 安装 ossutil v2
      - name: Setup ossutil v2
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip
          unzip -q ossutil.zip
          cd ossutil-2.1.2-linux-amd64
          chmod 755 ossutil
          sudo mv ossutil /usr/local/bin/
          ossutil version
          
      # 4. 上传到阿里云OSS
      - name: Upload to OSS
        env:
          # 使用正确的 Secrets 名称（与您在 GitHub 中配置的一致）
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          
        run: |
          # 进入包含解压后文件的目录
          cd ./downloaded-artifact
          
          # 直接使用命令行参数上传
          sudo ossutil cp -r . oss://cn-rdk-front-prod/magicbox_doc/ \
          -e https://d-robotics.cc \
          -i $OSS_ACCESS_KEY_ID \
          -k $OSS_ACCESS_KEY_SECRET \
          --region cn-beijing \
          --update \
          --retry-times=3