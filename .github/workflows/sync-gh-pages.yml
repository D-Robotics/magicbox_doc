name: Sync to Aliyun OSS

on:
  # 监听第一个工作流成功完成
  workflow_run:
    workflows: ["Deploy Docusaurus site to GitHub Pages"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # 添加这个权限

jobs:
  sync-to-oss:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. 下载第一个工作流构建的 Artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages  # upload-pages-artifact 默认上传的 artifact 名称
          path: ./downloaded-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      # 2. 正确解压 Artifact
      - name: Extract artifact
        run: |
          cd ./downloaded-artifact
          
          # 列出下载的文件
          echo "下载的文件："
          ls -la
          
          # 处理可能不同的文件名
          # 解压任何 .tar.gz 或 .tgz 文件
          if ls *.tar.gz 1> /dev/null 2>&1; then
              echo "找到 tar.gz 文件，开始第一次解压..."
              tar -xzf *.tar.gz
          elif ls *.tgz 1> /dev/null 2>&1; then
              echo "找到 tgz 文件，开始第一次解压..."
              tar -xzf *.tgz
          else
              echo "❌ 找不到 .tar.gz 或 .tgz 文件"
              exit 1
          fi
          
          # 第二次解压：处理内部的 tar 文件
          if [ -f "artifact.tar" ]; then
              echo "找到 artifact.tar，开始第二次解压..."
              tar -xf artifact.tar
          elif ls *.tar 1> /dev/null 2>&1; then
              TAR_FILE=$(ls *.tar | head -1)
              echo "找到 $TAR_FILE，开始第二次解压..."
              tar -xf "$TAR_FILE"
          else
              echo "❌ 找不到任何 tar 文件"
              exit 1
          fi
          
          # 显示最终结果
          echo "最终解压后的目录内容："
          ls -la
          
          # 确认是否解压出了网页文件
          if [ -f "index.html" ]; then
              echo "✅ 成功找到 index.html"
          else
              echo "⚠️ 警告：没有找到 index.html，可能解压不完整"
              find . -type f -name "*.html" | head -5
          fi
          
      # 3. 安装 ossutil v2
      - name: Setup ossutil v2
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip
          unzip -q ossutil.zip
          cd ossutil-2.1.2-linux-amd64
          chmod 755 ossutil
          sudo mv ossutil /usr/local/bin/
          ossutil version
          
      # 4. 上传到阿里云OSS
      - name: Upload to OSS
        env:
          # 使用正确的 Secrets 名称（与您在 GitHub 中配置的一致）
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          
        run: |
          # 进入包含解压后文件的目录
          cd ./downloaded-artifact
          
          # 直接使用命令行参数上传
          sudo ossutil cp -r . oss://cn-rdk-front-prod/magicbox_doc/ \
          -e https://d-robotics.cc \
          -i $OSS_ACCESS_KEY_ID \
          -k $OSS_ACCESS_KEY_SECRET \
          --region cn-beijing \
          --update \
          --retry-times=3