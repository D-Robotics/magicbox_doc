name: Sync to Aliyun OSS

on:
  # 监听第一个工作流成功完成
  workflow_run:
    workflows: ["Deploy Docusaurus site to GitHub Pages"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # 添加这个权限

jobs:
  sync-to-oss:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. 下载第一个工作流构建的 Artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages  # upload-pages-artifact 默认上传的 artifact 名称
          path: ./downloaded-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      # 2. 解压 Artifact
      - name: Extract artifact
        run: |
          cd ./downloaded-artifact
          
          # 查看下载的文件
          echo "下载的文件："
          ls -la
          
          # 直接解压 artifact.tar
          if [ -f "artifact.tar" ]; then
              echo "找到 artifact.tar，开始解压..."
              tar -xf artifact.tar
              echo "解压完成"
          else
              echo "❌ 找不到 artifact.tar 文件"
              exit 1
          fi
          
          # 显示解压后的内容
          echo "解压后的目录内容："
          ls -la
          
          # 确认是否解压出了网页文件
          if [ -f "index.html" ]; then
              echo "✅ 成功找到 index.html"
          else
              echo "⚠️ 当前目录下的文件："
              find . -type f -name "*.html" | head -10
          fi
          
          
          
      # 3. 安装 ossutil v2
      - name: Setup ossutil v2
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip
          unzip -q ossutil.zip
          cd ossutil-2.1.2-linux-amd64
          chmod 755 ossutil
          sudo mv ossutil /usr/local/bin/
          ossutil version
          
      # 4. 上传到阿里云OSS
      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          
        run: |
          # 进入包含解压后文件的目录
          cd ./downloaded-artifact
          
          # 显示将要上传的文件列表
          echo "=== 准备上传以下文件 ==="
          ls -la
          echo "文件总数: $(find . -type f | wc -l)"
          echo "目录总数: $(find . -type d | wc -l)"
          
          # 先测试 OSS 连接是否正常
          echo "=== 测试 OSS 连接 ==="
          sudo ossutil ls oss://cn-rdk-front-prod/ \
            -e https://d-robotics.cc \
            -i $OSS_ACCESS_KEY_ID \
            -k $OSS_ACCESS_KEY_SECRET \
            --region cn-beijing || echo "❌ OSS 连接测试失败，请检查配置"
          
          # 尝试上传单个文件测试权限
          echo "=== 测试上传权限 ==="
          echo "test" > test.txt
          sudo ossutil cp test.txt oss://cn-rdk-front-prod/test.txt \
            -e https://d-robotics.cc \
            -i $OSS_ACCESS_KEY_ID \
            -k $OSS_ACCESS_KEY_SECRET \
            --region cn-beijing && echo "✅ 权限测试成功" || echo "❌ 权限测试失败"
          
          # 正式上传（添加详细输出）
          echo "=== 开始上传文件 ==="
          sudo ossutil cp -r . oss://cn-rdk-front-prod/magicbox_doc/ \
            -e https://d-robotics.cc \
            -i $OSS_ACCESS_KEY_ID \
            -k $OSS_ACCESS_KEY_SECRET \
            --region cn-beijing \
            --update \
            --retry-times=3 \
            --output-dir ./ossutil_output_debug
          
          # 显示错误报告
          if [ -f "./ossutil_output_debug/ossutil_report_*.report" ]; then
            echo "=== 错误报告内容 ==="
            cat ./ossutil_output_debug/ossutil_report_*.report
          fi